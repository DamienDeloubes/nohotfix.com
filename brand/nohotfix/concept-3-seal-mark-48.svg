<!-- NoHotfix — Concept 3: The Seal -->
<!-- Mark only, 48×48 canvas -->
<!-- An octagon (the gate/stop/seal geometry) with a horizontal bar cut in negative space -->
<!-- The bar is the single gate — one line, one decision, the go/no-go threshold -->
<!-- Approach: filled octagon (Brand-500) + white cutout bar -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!--
    Octagon geometry:
    Center: (24, 24), "radius" to vertex = 21px
    Octagon vertices at 22.5° offsets from 0°
    Flat-top octagon (flat edges top and bottom) — more stable/institutional than pointed-top
    Vertices (flat-top, clockwise from top-left):
      Top edge:    (16.3, 3)  → (31.7, 3)
      Right edge:  (44.5, 10) → (44.5, 38)  [approximate — correct below]

    Using standard flat-top octagon inscribed in 48px square with 4px inset:
    Inset = 5px from edges. Side length s, corner cut = (48-2×5-s)/?

    Cleaner: define via path with explicit coords.
    For a flat-top regular octagon with outer radius 21px centered at (24,24):
    Flat top means vertices at angles: 22.5°, 67.5°, 112.5°, 157.5°, 202.5°, 247.5°, 292.5°, 337.5°

    x = 24 + 21×cos(angle), y = 24 + 21×sin(angle)

    337.5°: cos=-0.924, sin=-0.383 → (24-19.4, 24-8.0) = (4.6, 16.0)
     22.5°: cos= 0.924, sin=-0.383 → (43.4, 16.0)
     67.5°: cos= 0.383, sin= 0.924 → (32.0, 43.4)  — wait, 67.5° from x-axis positive

    Let me recalculate properly. SVG y increases downward.
    Standard angle from positive x-axis, counterclockwise in math = clockwise in SVG.

    Flat-top octagon: first edge is horizontal on top.
    Vertices going clockwise from top-left:
    angle from top going clockwise:
      0°   = top-right corner of top edge
      45°  = right-top corner of right edge
      90°  = right-bottom corner of right edge
      135° = bottom-right corner
      etc.

    Using: angle_from_positive_x = -90° + n×45° for n=0..7
    (starts at top, goes clockwise)

    n=0: -90° → (24 + 21×cos(-90°), 24 + 21×sin(-90°)) = (24+0, 24-21) = (24, 3)  ← top vertex (pointed top, not flat)

    For FLAT-TOP: rotate 22.5°, so start angle = -90° + 22.5° = -67.5°

    n=0: -67.5°: cos= 0.383, sin=-0.924 → (24+8.0,  24-19.4) = (32.0,  4.6)
    n=1: -22.5°: cos= 0.924, sin=-0.383 → (24+19.4, 24-8.0)  = (43.4, 16.0)
    n=2:  22.5°: cos= 0.924, sin= 0.383 → (24+19.4, 24+8.0)  = (43.4, 32.0)
    n=3:  67.5°: cos= 0.383, sin= 0.924 → (24+8.0,  24+19.4) = (32.0, 43.4)
    n=4: 112.5°: cos=-0.383, sin= 0.924 → (24-8.0,  24+19.4) = (16.0, 43.4)
    n=5: 157.5°: cos=-0.924, sin= 0.383 → (24-19.4, 24+8.0)  = ( 4.6, 32.0)
    n=6: 202.5°: cos=-0.924, sin=-0.383 → (24-19.4, 24-8.0)  = ( 4.6, 16.0)
    n=7: 247.5°: cos=-0.383, sin=-0.924 → (24-8.0,  24-19.4) = (16.0,  4.6)

    This gives a flat-top octagon with:
    - Top flat edge from (16.0, 4.6) to (32.0, 4.6) ← horizontal ✓
    - Bottom flat edge from (16.0, 43.4) to (32.0, 43.4) ✓
    - Left/right flat edges horizontal ✓ (this is actually a flat-left/right octagon)

    Actually for flat-top (horizontal top and bottom edges):
    Start at top-left vertex = (16.0, 4.6), go clockwise.
  -->

  <!-- Filled octagon — Brand-500 -->
  <path
    d="M 16.0 4.6 L 32.0 4.6 L 43.4 16.0 L 43.4 32.0 L 32.0 43.4 L 16.0 43.4 L 4.6 32.0 L 4.6 16.0 Z"
    fill="#1A3FFF"
  />

  <!-- Negative space: horizontal gate bar cut through the octagon -->
  <!-- A single bold horizontal bar centered vertically, spanning ~60% of the octagon width -->
  <!-- This is the go/no-go threshold: a single line that every release must cross -->
  <!-- Width: 28px centered at x=24, so x=10 to x=38. Height: 4px centered at y=24 -->
  <rect
    x="10" y="21.5"
    width="28" height="5"
    rx="2.5"
    fill="#FFFFFF"
  />
</svg>
