<!-- NoHotfix — Concept 2: The Negation Mark -->
<!-- Horizontal lockup — light background -->
<!-- Canvas: 280×48. Mark at 28px (scale 1.1667 from 24px base). Gap 12px. Wordmark begins at x=52 -->
<!-- Wordmark: "No" Inter 800 italic Ember-500, "hotfix" Inter 300 Ink-600 with diagonal strikethrough -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <!-- Mark group: translate(10,10) scale(1.1667) maps 24px geometry to 28px output -->
  <g transform="translate(10, 10) scale(1.1667)">
    <!-- Patch rectangle — Ink-400 -->
    <rect
      x="3" y="5"
      width="18" height="14"
      rx="2.5"
      stroke="#5E6E9E"
      stroke-width="1.75"
      stroke-linejoin="round"
    />
    <!-- Elimination bar — Brand-500 -->
    <line
      x1="18.5" y1="4"
      x2="5.5" y2="20"
      stroke="#1A3FFF"
      stroke-width="2.75"
      stroke-linecap="round"
    />
  </g>

  <!-- Wordmark group — baseline at y=30 (62.5% of 48px = optical center for 18px text) -->
  <!-- "No" — Inter 800, italic, Ember-500, slight weight makes the N visually wider -->
  <text
    x="52"
    y="30"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="18"
    font-weight="800"
    font-style="italic"
    fill="#FF6B2B"
    letter-spacing="-0.01em"
  >No</text>

  <!-- "hotfix" — Inter 300, regular, Ink-600 — subdued, the thing being negated -->
  <!-- x positioned after "No" — "No" at 800/italic/18px ≈ 27px wide; gap 1.5px -->
  <text
    x="80"
    y="30"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="18"
    font-weight="300"
    fill="#2C3760"
    letter-spacing="0.005em"
  >hotfix</text>

  <!-- Strikethrough line over "hotfix" only — Brand-500, 1.5px, precise vertical center of cap height -->
  <!-- "hotfix" starts at x=80, cap height for 18px Inter ≈ 12.6px (0.7 × font-size) -->
  <!-- Strikethrough y = baseline - (cap_height × 0.45) = 30 - 5.7 ≈ 24.3 -->
  <!-- "hotfix" at Inter 300/18px ≈ 51px wide -->
  <line
    x1="80" y1="24"
    x2="131" y2="24"
    stroke="#1A3FFF"
    stroke-width="1.5"
    stroke-linecap="round"
  />
</svg>
