<!-- NoHotfix — Concept 2: The Negation Mark -->
<!-- Favicon 16×16 — progressive disclosure: dominant diagonal only at this size -->
<!-- At 16px the rectangle would degrade — drop it, keep only the Brand-500 bar -->
<!-- This reads as a decisive slash — the brand's core act at its smallest unit -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Minimal rectangle hint — just the corner points, very light -->
  <rect
    x="2" y="3.5"
    width="12" height="9"
    rx="2"
    stroke="#5E6E9E"
    stroke-width="1.25"
    stroke-linejoin="round"
  />
  <!-- The authoritative bar — dominant, Brand-500 -->
  <line
    x1="12.5" y1="2.5"
    x2="3.5" y2="13.5"
    stroke="#1A3FFF"
    stroke-width="2"
    stroke-linecap="round"
  />
</svg>
