<!-- NoHotfix — Concept 2: The Negation Mark -->
<!-- Horizontal lockup — dark background -->
<!-- Canvas: 280×48. Same geometry as light variant, inverted colors -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <!-- Dark background -->
  <rect width="280" height="48" fill="#090B14"/>

  <!-- Mark group -->
  <g transform="translate(10, 10) scale(1.1667)">
    <!-- Patch rectangle — lighter on dark, glass-adjacent -->
    <rect
      x="3" y="5"
      width="18" height="14"
      rx="2.5"
      stroke="#5E6E9E"
      stroke-width="1.75"
      stroke-linejoin="round"
    />
    <!-- Elimination bar — Brand-300 on dark for legibility -->
    <line
      x1="18.5" y1="4"
      x2="5.5" y2="20"
      stroke="#7F97FF"
      stroke-width="2.75"
      stroke-linecap="round"
    />
  </g>

  <!-- "No" — Ember-400 on dark (slightly lighter than 500 for dark-bg legibility) -->
  <text
    x="52"
    y="30"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="18"
    font-weight="800"
    font-style="italic"
    fill="#FF8C57"
    letter-spacing="-0.01em"
  >No</text>

  <!-- "hotfix" — Ink-200 on dark -->
  <text
    x="80"
    y="30"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="18"
    font-weight="300"
    fill="#A8B4CC"
    letter-spacing="0.005em"
  >hotfix</text>

  <!-- Strikethrough line — Brand-300 on dark -->
  <line
    x1="80" y1="24"
    x2="131" y2="24"
    stroke="#7F97FF"
    stroke-width="1.5"
    stroke-linecap="round"
  />
</svg>
