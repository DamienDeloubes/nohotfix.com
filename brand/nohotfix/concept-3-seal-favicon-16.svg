<!-- NoHotfix — Concept 3: The Seal -->
<!-- Favicon 16×16 — scale factor 0.333 from 48px base -->
<!-- At 16px, filled octagon alone is sufficient — internal bar drops to 1.5px height -->
<!-- The filled octagon shape is immediately distinct at 16px -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Octagon scaled to 16px: all coords × (16/48) = × 0.333 -->
  <!-- Original: 16.0,4.6 → 5.3,1.5 | 32.0,4.6 → 10.7,1.5 | 43.4,16.0 → 14.5,5.3 -->
  <!-- 43.4,32.0 → 14.5,10.7 | 32.0,43.4 → 10.7,14.5 | 16.0,43.4 → 5.3,14.5 -->
  <!-- 4.6,32.0 → 1.5,10.7 | 4.6,16.0 → 1.5,5.3 -->
  <path
    d="M 5.3 1.5 L 10.7 1.5 L 14.5 5.3 L 14.5 10.7 L 10.7 14.5 L 5.3 14.5 L 1.5 10.7 L 1.5 5.3 Z"
    fill="#1A3FFF"
  />
  <!-- Internal bar — 1.5px height, visible at 16px as a clear notch -->
  <rect
    x="3.5" y="7.25"
    width="9" height="1.5"
    rx="0.75"
    fill="#FFFFFF"
  />
</svg>
