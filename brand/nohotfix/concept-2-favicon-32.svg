<!-- NoHotfix — Concept 2: The Negation Mark -->
<!-- Favicon 32×32 — scale factor 1.333 from 24px base -->
<!-- Both elements present at this size -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Patch rectangle -->
  <rect
    x="4" y="6.5"
    width="24" height="19"
    rx="3.5"
    stroke="#5E6E9E"
    stroke-width="2.25"
    stroke-linejoin="round"
  />
  <!-- Elimination bar -->
  <line
    x1="24.5" y1="5"
    x2="7.5" y2="27"
    stroke="#1A3FFF"
    stroke-width="3.5"
    stroke-linecap="round"
  />
</svg>
