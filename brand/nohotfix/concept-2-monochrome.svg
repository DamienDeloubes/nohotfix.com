<!-- NoHotfix — Concept 2: The Negation Mark -->
<!-- Monochrome version — single color (#000000), for embossing, single-color print, B&W contexts -->
<!-- Mark at 48px. Patch rectangle and elimination bar both collapse to same color -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Patch rectangle — same weight hierarchy maintained in monochrome -->
  <rect
    x="6" y="10"
    width="36" height="28"
    rx="5"
    stroke="#000000"
    stroke-width="3"
    stroke-linejoin="round"
  />
  <!-- Elimination bar — heavier stroke than rect to maintain hierarchy in monochrome -->
  <line
    x1="37" y1="8"
    x2="11" y2="40"
    stroke="#000000"
    stroke-width="5.5"
    stroke-linecap="round"
  />
</svg>
