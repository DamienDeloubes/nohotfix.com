<!-- NoHotfix — Concept 2: The Negation Mark -->
<!-- Mark only, 48×48 — scale factor 2.0 from 24px base -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Patch rectangle — scaled 2× -->
  <rect
    x="6" y="10"
    width="36" height="28"
    rx="5"
    stroke="#5E6E9E"
    stroke-width="3.5"
    stroke-linejoin="round"
  />
  <!-- Elimination bar — scaled 2× -->
  <line
    x1="37" y1="8"
    x2="11" y2="40"
    stroke="#1A3FFF"
    stroke-width="5.5"
    stroke-linecap="round"
  />
</svg>
