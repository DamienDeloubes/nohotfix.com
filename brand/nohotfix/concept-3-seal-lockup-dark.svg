<!-- NoHotfix — Concept 3: The Seal -->
<!-- Horizontal lockup — dark background -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 48" fill="none">
  <!-- Dark background -->
  <rect width="300" height="48" fill="#090B14"/>

  <!-- Mark: octagon remains Brand-500 — blue reads strong on dark -->
  <g transform="translate(8, 8) scale(0.6667)">
    <path
      d="M 16.0 4.6 L 32.0 4.6 L 43.4 16.0 L 43.4 32.0 L 32.0 43.4 L 16.0 43.4 L 4.6 32.0 L 4.6 16.0 Z"
      fill="#1A3FFF"
    />
    <rect
      x="10" y="21.5"
      width="28" height="5"
      rx="2.5"
      fill="#090B14"
    />
  </g>

  <!-- "No" — Brand-300 on dark for legibility without losing blue identity -->
  <text
    x="52"
    y="30"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="18"
    font-weight="600"
    fill="#7F97FF"
    letter-spacing="-0.01em"
  >No</text>

  <!-- "Hotfix" — Ink-200 on dark -->
  <text
    x="76"
    y="30"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="18"
    font-weight="400"
    fill="#A8B4CC"
    letter-spacing="0.02em"
  >Hotfix</text>
</svg>
