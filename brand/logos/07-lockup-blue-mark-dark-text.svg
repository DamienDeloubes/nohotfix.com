<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" width="240" height="48" fill="none">
  <rect width="240" height="48" fill="#FFFFFF"/>
  <!-- Mark: blue strokes, 24x24 base scaled to 28x28, centered vertically -->
  <g transform="translate(10, 10) scale(1.1667)">
    <!-- Dominant diagonal: (18,4) → (6,18) -->
    <line x1="18" y1="4" x2="6" y2="18" stroke="#0036FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Upper horizontal bar: (3,13) → (10,13) -->
    <line x1="3" y1="13" x2="10" y2="13" stroke="#0036FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Lower horizontal bar: (3,18) → (8,18) -->
    <line x1="3" y1="18" x2="8" y2="18" stroke="#0036FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Wordmark: dark text, text starts at x=48, baseline at y=30 -->
  <text font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" letter-spacing="0.18" fill="#0F172A" y="30">
    <tspan font-weight="400" x="48">Release</tspan><tspan font-weight="700">Hawk</tspan>
  </text>
</svg>
